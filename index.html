<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind 8</title>
  <link rel="stylesheet" href="./src/output.css">
</head>
<body>

  <!-- Header -->  
  <nav class="flex items-center justify-between px-6 py-4 bg-white shadow-sm">
  
  <div class="flex items-center space-x-2">

    <img src="Logo Lawliet.png" alt="Lawliet Logo" class="h-8 w-auto">
    <span class="text-xl font-bold text-slate-900">Lawliet</span>
  </div>

  
  <div class="flex items-center space-x-8">
   
    <div class="hidden md:flex space-x-6">
      <a href="#" class="text-xs font-semibold tracking-widest text-slate-500 hover:text-slate-900 uppercase">Contact</a>
      <a href="#" class="text-xs font-semibold tracking-widest text-slate-500 hover:text-slate-900 uppercase">Testimonials</a>
      <a href="#" class="text-xs font-semibold tracking-widest text-slate-500 hover:text-slate-900 uppercase">About</a>
      <a href="#" class="text-xs font-semibold tracking-widest text-slate-500 hover:text-slate-900 uppercase">Terms</a>
    </div>

    
    <button class="text-slate-600 hover:text-slate-900 focus:outline-none">
      
      <img src="Search Icon.png" alt="Search" class="h-5 w-5">
    </button>
  </div>
</nav>


<!-- Section 2 -->
<section class="relative overflow-hidden bg-white px-6 py-12 md:py-20">
 
  <div class="absolute top-0 right-0 -mr-20 -mt-20 h-[600px] w-[600px] rounded-full bg-blue-50 opacity-50"></div>

  <div class="container mx-auto relative z-10">
    <div class="flex flex-col items-center md:flex-row md:justify-between">
      
      
      <div class="w-full md:w-1/2 mb-12 md:mb-0">
     
        <div class="mb-6 flex items-center space-x-3 rounded-full bg-blue-50 p-1 pr-4 w-fit">
          <span class="rounded-full bg-[#0B405F] px-3 py-1 text-[10px] font-bold text-white uppercase">New</span>
          <p class="text-xs text-slate-500">Stay connected to the upcoming & Recent jobs</p>
        </div>

       
        <h1 class="mb-6 text-5xl font-serif font-bold leading-tight text-[#0B405F] md:text-6xl">
          Your Solution<br>Legal Consultancy
        </h1>

        
        <p class="mb-8 max-w-md text-slate-500 leading-relaxed">
          We are here to help you take care of your legality with the best service especially for you.
        </p>

        <button class="rounded-md bg-[#0B405F] px-10 py-4 text-xs font-bold tracking-widest text-white uppercase transition hover:bg-slate-800">
          Get Started
        </button>

      
        <div class="mt-16">
          <p class="mb-6 text-sm text-slate-400">Trusted by 10+ companies in indonesia</p>
          <div class="grid grid-cols-2 gap-8 opacity-60 md:flex md:items-center md:space-x-8">
            <img src="Airbnb Logo.png" alt="Airbnb" class="h-6 object-contain">
            <img src="Layer 2.png" alt="HubSpot" class="h-6 object-contain">
            <img src="Microsoft Logo.png" alt="Microsoft" class="h-6 object-contain">
            <img src="Google Logo.png" alt="Google" class="h-6 object-contain">
          </div>
        </div>
      </div>

      
      <div class="relative w-full md:w-1/2 flex justify-center md:justify-end">
        <div class="relative max-w-[450px]">
          
          <img src="woman.png" alt="Tiara Andini" class="rounded-b-full">
          
         
          <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-3/4 rounded-xl bg-white p-4 shadow-xl text-center">
            <h3 class="text-lg font-bold text-slate-900">Tiara Andini</h3>
            <p class="text-xs text-slate-400">-Lawyer</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>



</body>
</html>
